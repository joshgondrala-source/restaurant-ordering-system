<!DOCTYPE html>
<html>
<style>

body{
    font-size:24px;
    padding:20px;
}

button{
    font-size:22px;
    padding:15px;
}

input{
    font-size:22px;
    padding:10px;
}

textarea{
    font-size:20px;
}

</style>
<head>
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Your Cart</h1>

{% for item in cart %}

<h3>{{ item.name }}</h3>

<p>Quantity: {{ item.quantity }}</p>

<p>Instructions:</p>

<p>{{ item.instructions }}</p>

<p>
Total:
₹{{ item.price * item.quantity }}
</p>

<form action="/deleteitem" method="POST">

    <input
        type="hidden"
        name="item_name"
        value="{{ item.name }}">

    <button type="submit">
        Delete
    </button>

</form>
<hr>

{% endfor %}
<h2>Grand Total: ₹{{ grand_total }}</h2>
<br>

<a href="/menu">
    <button>Add Other Items</button>
</a>
<form action="/placeorder" method="POST">
    <button type="submit">
        Place Order
    </button>
</form>
</body>
</html>
