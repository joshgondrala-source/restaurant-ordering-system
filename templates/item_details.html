<!DOCTYPE html>
<html>
<style>

body{
    font-size:24px;
    padding:20px;
}

button{
    font-size:22px;
    padding:15px;
}

input{
    font-size:22px;
    padding:10px;
}

textarea{
    font-size:20px;
}

</style>
<head>
    <title>Item Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>{{ item.name }}</h1>

<h3>Price: ₹{{ item.price }}</h3>

<p>🍽 Serves: {{ item.serves }}</p>

<p>🌶 Spice Level: {{ item.spice }}</p>



<form action="/addtocart" method="POST">

    <input type="hidden"
           name="item_name"
           value="{{ item.name }}">

    <input type="hidden"
           name="price"
           value="{{ item.price }}">
    <h3>Special Instructions</h3>

    <textarea
        name="instructions"
        rows="4"
        cols="40"
        placeholder="Extra onions, less oil, extra butter"></textarea>
    

    <br><br>

    <h3>Quantity</h3>

    <input
        type="number"
        name="quantity"
        value="1"
        min="1">

    <br><br>

    <button type="submit">
        Add To Cart
    </button>

</form>
</body>
</html>
