<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bobby Da Dhaba — Menu Items</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5c1010">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:          #f2e9d8;
  --bg2:         #e8dbc4;
  --paper:       #fffdf7;
  --ink:         #1e1208;
  --ink2:        #4a3828;
  --muted:       #8c7460;
  --line:        #ddd0b8;
  --brand:       #5c1010;
  --brand2:      #7a1a1a;
  --brand-dark:  #3d0808;
  --brand-text:  #fff8f0;
  --gold:        #c8881e;
  --gold-soft:   #f7e3b8;
  --gold-bg:     #fdf3df;
  --shadow-xs:   0 1px 3px rgba(30,18,8,.07);
  --shadow-sm:   0 3px 10px rgba(30,18,8,.10);
  --shadow-md:   0 8px 24px rgba(30,18,8,.15);
  --shadow-lg:   0 18px 48px rgba(30,18,8,.22);
  --r:           20px;
  --r-sm:        13px;
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  background:
    radial-gradient(ellipse 900px 500px at -5% -5%, rgba(200,136,30,.22) 0%, transparent 55%),
    radial-gradient(ellipse 700px 400px at 105% 5%, rgba(92,16,16,.18) 0%, transparent 50%),
    radial-gradient(ellipse 600px 600px at 50% 110%, rgba(92,16,16,.08) 0%, transparent 60%),
    linear-gradient(170deg, var(--bg) 0%, var(--bg2) 100%);
  background-attachment: fixed;
  max-width: 500px;
  margin-inline: auto;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 30;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
  color: var(--brand-text);
  padding: calc(env(safe-area-inset-top, 0px) + 14px) 16px 16px;
  border-bottom: 3px solid var(--gold);
  box-shadow: var(--shadow-lg);
  isolation: isolate;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 500px 180px at 50% -60px, rgba(200,136,30,.32), transparent 70%);
  pointer-events: none; z-index: -1;
}
.header::after {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  border: 1px solid rgba(200,136,30,.25);
  pointer-events: none;
}

/* topbar row inside header */
.header-row {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative; z-index: 1;
}

.back-btn {
  width: 44px; height: 44px;
  border-radius: var(--r-sm);
  background: rgba(255,255,255,.13);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background .14s ease, transform .14s ease;
  text-decoration: none;
}
.back-btn:active { background: rgba(255,255,255,.22); transform: scale(.91); }
.back-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.header-center {
  flex: 1;
  text-align: center;
}
.header-crest {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: 1.5px dashed rgba(200,136,30,.6);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 5px;
}
.header-brand {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 20px;
  letter-spacing: 1.5px;
  line-height: 1;
  color: #fff;
}

.table-chip {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 7px;
  height: 44px; padding: 0 14px;
  border-radius: var(--r-sm);
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  font-size: 12px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--gold-soft);
}
.table-chip .live {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,136,30,.3);
  animation: live-pulse 2s ease-in-out infinite;
}
@keyframes live-pulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(200,136,30,.3); }
  50%      { box-shadow: 0 0 0 7px rgba(200,136,30,0); }
}

/* ── CATEGORY HERO ── */
.cat-hero {
  text-align: center;
  padding: 26px 20px 10px;
}
.hero-label {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--brand);
  margin-bottom: 12px;
}
.hero-label::before, .hero-label::after {
  content: ''; display: inline-block;
  width: 22px; height: 1px;
  background: var(--brand); opacity: .45;
}
.cat-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(30px, 9vw, 42px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.05;
  color: var(--ink);
}
.cat-title em {
  font-style: italic; font-weight: 400;
  color: var(--brand);
}
.cat-sub {
  margin-top: 8px;
  font-size: 13.5px;
  color: var(--muted);
  letter-spacing: .3px;
}

/* ornament rule */
.ornament {
  display: flex; align-items: center; gap: 12px;
  padding: 20px 20px 16px;
}
.ornament::before, .ornament::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
}
.ornament-inner {
  color: var(--gold);
  font-size: 12px; letter-spacing: 6px;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 0 14px;
}

/* ── ITEM CARD ── */
.item-card {
  position: relative;
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  isolation: isolate;
  transition: transform .16s cubic-bezier(.2,.8,.2,1), box-shadow .16s ease, border-color .16s ease;
  text-decoration: none;
  color: var(--ink);
}
.item-card:active {
  transform: scale(.965) translateY(1px);
  box-shadow: var(--shadow-md);
  border-color: var(--gold);
}

/* top accent swatch — same as category cards */
.card-swatch {
  height: 7px;
  background: linear-gradient(90deg, var(--brand) 0%, var(--brand2) 100%);
  flex-shrink: 0;
}

.card-inner {
  flex: 1;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 14px 14px 13px;
}

/* dish icon circle */
.dish-icon {
  width: 46px; height: 46px;
  border-radius: 14px;
  background: var(--gold-bg);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 12px;
  flex-shrink: 0;
  position: relative;
}
.dish-icon::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit;
  box-shadow: inset 0 -2px 0 rgba(0,0,0,.07), inset 0 1px 0 rgba(255,255,255,.6);
}

.item-name {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 900;
  letter-spacing: -.3px;
  line-height: 1.2;
  color: var(--ink);
  /* allow wrapping, no ellipsis — we have space in 2-col */
}

.price-row {
  display: flex; align-items: baseline; gap: 5px;
  margin-top: 8px;
}
.price-label {
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--gold);
}
.item-price {
  font-family: 'Fraunces', serif;
  font-size: 20px; font-weight: 900;
  color: var(--brand);
  letter-spacing: -.3px;
}

.item-tag {
  margin-top: 5px;
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}
.item-tag::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

.card-foot {
  margin-top: 13px;
  display: flex; align-items: center; justify-content: space-between;
}

.view-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--brand);
  color: var(--brand-text);
  font-size: 17px; font-weight: 900;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  transition: transform .16s ease, background .16s ease;
}
.item-card:active .view-btn {
  transform: translateX(3px);
  background: var(--brand2);
}

.card-badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--gold-soft);
  color: #6b4a08;
  font-size: 9.5px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
}
/* CART FAB — paste inside <style> on every page */
.cart-fab {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 22px);
  right: 22px;
  z-index: 50;
  width: 62px; height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7a1a1a 0%, #3d0808 100%);
  color: #fff8f0;
  font-size: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  text-decoration: none;
  box-shadow: 0 8px 24px rgba(92,16,16,.55), 0 0 0 3px #c8881e;
  transition: transform .15s ease;
}
.cart-fab:active { transform: scale(.91); }

/* ── FOOTER ── */
.foot-note {
  text-align: center;
  margin-top: 32px;
  font-size: 10.5px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.foot-note b { color: var(--gold); font-weight: 800; }
</style>
</head>
<!-- CART FAB — paste just before </body> on every page -->
<a href="/cart?table={{ table }}" class="cart-fab" aria-label="View Cart">
  🛒
</a>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <a href="javascript:history.back()" class="back-btn" aria-label="Back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="header-center">
      <div class="header-crest">🍽️</div>
      <div class="header-brand">BOBBY DA DHABA</div>
    </div>
    <div class="table-chip">
      <span class="live"></span>
      Table {{ table }}
    </div>
  </div>
</div>

<!-- CATEGORY HERO -->
<div class="cat-hero">
  <div class="hero-label">Our Menu</div>
  <h1 class="cat-title">{{ category.replace("_"," ").title() }}</h1>
  <p class="cat-sub">Tandoor-fresh · Made to order</p>
</div>

<div class="ornament">
  <div class="ornament-inner">✦ ✦ ✦</div>
</div>

<!-- ITEM GRID -->
<main class="grid">
  {% for item in items %}
  <a class="item-card" href="/itemdetails?name={{ item.name|urlencode }}&table={{ table }}">
    <div class="card-swatch"></div>
    <div class="card-inner">
      <div class="dish-icon" data-name="{{ item.name }}">🍽️</div>
      <div class="item-name">{{ item.name }}</div>
      <div class="price-row">
        <span class="price-label">₹</span>
        <span class="item-price">{{ item.price }}</span>
      </div>
      <div class="item-tag">Freshly prepared</div>
      <div class="card-foot">
        <span class="card-badge">View</span>
        <span class="view-btn">›</span>
      </div>
    </div>
  </a>
  {% endfor %}
</main>

<p class="foot-note">Swaad <b>●</b> Seva <b>●</b> Sanskar</p>

<script>
const EMOJI_MAP = [
  // Chicken
  [/chicken/i,       '🍗'],
  [/leg.piece|leg/i, '🍗'],
  [/wings?/i,        '🍗'],
  [/tikka/i,         '🍢'],
  [/kebab|kabab/i,   '🥩'],
  [/tandoor/i,       '🔥'],
  [/biryani/i,       '🍚'],
  [/fried.rice|rice/i,'🍚'],
  [/noodle|chow/i,   '🍜'],
  [/chop.?suey/i,    '🍜'],
  [/manchurian/i,    '🥣'],
  [/soup/i,          '🍲'],
  [/roti|chapati|naan|paratha|bread/i, '🫓'],
  [/dal|daal/i,      '🫕'],
  [/paneer/i,        '🧀'],
  [/curry/i,         '🍛'],
  [/gravy/i,         '🍛'],
  [/masala/i,        '🌶️'],
  [/egg|anda/i,      '🥚'],
  [/fish|prawn|seafood/i, '🐟'],
  [/mutton|lamb/i,   '🥩'],
  [/salad/i,         '🥗'],
  [/papad/i,         '🍘'],
  [/fry|fried/i,     '🍳'],
  [/juice|lassi|buttermilk/i, '🥛'],
  [/cola|pepsi|coke|soda|water/i, '🥤'],
  [/tea|chai/i,      '🍵'],
  [/coffee/i,        '☕'],
  [/ice.?cream|dessert|sweet/i, '🍨'],
  [/gulab.jamun/i,   '🍮'],
  [/halwa/i,         '🍮'],
  [/family|jumbo|combo/i, '👨‍👩‍👧‍👦'],
];

document.querySelectorAll('.dish-icon[data-name]').forEach(el => {
  const name = el.dataset.name || '';
  const match = EMOJI_MAP.find(([re]) => re.test(name));
  el.textContent = match ? match[1] : '🍽️';
});
</script>

</body>
</html>
